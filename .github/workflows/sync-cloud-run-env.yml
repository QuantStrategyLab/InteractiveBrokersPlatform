      - name: Sync Cloud Scheduler schedule
        if: steps.config.outputs.env_sync_enabled == 'true'
        env:
          SYNC_PLAN_JSON: ${{ steps.strategy_requirements.outputs.sync_plan_json }}
        run: |
          set -euo pipefail

          scheduler_location="${CLOUD_SCHEDULER_LOCATION:-${CLOUD_RUN_REGION}}"
          if [ -z "${scheduler_location}" ]; then
            echo "Cloud Scheduler schedule sync requires CLOUD_RUN_REGION or CLOUD_SCHEDULER_LOCATION." >&2
            exit 1
          fi

          mapfile -t scheduler_updates < <(python - <<'PY'
          import json
          import os

          def configured_time(name: str, default: str) -> str:
              return os.environ.get(name, "").strip() or default

          plan = json.loads(os.environ["SYNC_PLAN_JSON"])
          for target in plan["targets"]:
              service_name = str(target["service_name"]).strip()
              env = target.get("env") or {}
              scheduler = target.get("scheduler") or {}
              timezone = str(scheduler.get("timezone") or env.get("IBKR_MARKET_TIMEZONE") or "").strip()
              market = str(env.get("IBKR_MARKET") or "").strip().upper()
              if not timezone:
                  timezone = "Asia/Hong_Kong" if market == "HK" else "America/New_York"
              print(
                  "\t".join(
                      [
                          service_name,
                          timezone,
                          str(scheduler.get("main_time") or configured_time("CLOUD_SCHEDULER_MAIN_TIME", "45 15")),
                          str(scheduler.get("probe_time") or configured_time("CLOUD_SCHEDULER_PROBE_TIME", "35 9,15")),
                          str(scheduler.get("precheck_time") or configured_time("CLOUD_SCHEDULER_PRECHECK_TIME", "45 9")),
                      ]
                  )
              )
          PY
          )

          for update in "${scheduler_updates[@]}"; do
            IFS=$'\t' read -r cloud_run_service market_timezone main_time probe_time precheck_time <<< "${update}"
            if [ -z "${cloud_run_service}" ] || [ -z "${market_timezone}" ]; then
              continue
            fi

            service_url="$(gcloud run services describe "${cloud_run_service}" \
              --project="${GCP_PROJECT_ID}" \
              --region="${CLOUD_RUN_REGION}" \
              --format='value(status.url)' 2>/dev/null || true)"
            if [ -z "${service_url}" ]; then
              echo "Unable to resolve Cloud Run service URL for ${cloud_run_service}; cannot sync scheduler URI." >&2
              exit 1
            fi

            for suffix in scheduler probe-scheduler precheck-scheduler; do
              case "${suffix}" in
                scheduler)
                  schedule_time="${main_time}"
                  scheduler_path="/run"
                  ;;
                probe-scheduler)
                  schedule_time="${probe_time}"
                  scheduler_path="/probe"
                  ;;
                precheck-scheduler)
                  schedule_time="${precheck_time}"
                  scheduler_path="/dry-run"
                  ;;
              esac

              scheduler_job_candidates=("${cloud_run_service}-${suffix}")
              if [[ "${cloud_run_service}" == *-service ]]; then
                scheduler_job_candidates+=("${cloud_run_service%-service}-${suffix}")
              fi

              job_name=""
              current_schedule=""
              for candidate_job in "${scheduler_job_candidates[@]}"; do
                current_schedule="$(gcloud scheduler jobs describe "${candidate_job}" \
                  --project="${GCP_PROJECT_ID}" \
                  --location="${scheduler_location}" \
                  --format='value(schedule)' 2>/dev/null || true)"
                if [ -n "${current_schedule}" ]; then
                  job_name="${candidate_job}"
                  break
                fi
              done

              if [ -z "${current_schedule}" ]; then
                echo "Cloud Scheduler job for ${cloud_run_service} ${suffix} was not found in ${scheduler_location}; skipping schedule sync."
                continue
              fi

              desired_schedule="$(CURRENT_SCHEDULE="${current_schedule}" SCHEDULE_TIME="${schedule_time}" python - <<'PY'
          import os

          current_fields = os.environ["CURRENT_SCHEDULE"].split()
          time_fields = os.environ["SCHEDULE_TIME"].split()
          if len(current_fields) != 5:
              raise SystemExit(f"Cloud Scheduler schedule must have 5 fields: {os.environ['CURRENT_SCHEDULE']!r}")
          if len(time_fields) == 5:
              print(" ".join(time_fields))
          elif len(time_fields) == 2:
              print(" ".join([*time_fields, *current_fields[2:]]))
          else:
              raise SystemExit(
                  f"Cloud Scheduler override must have 2 time fields or 5 cron fields: {os.environ['SCHEDULE_TIME']!r}"
              )
          PY
              )"

              scheduler_uri="${service_url}${scheduler_path}"
              echo "Updating Cloud Scheduler job ${job_name} schedule to ${desired_schedule}, timezone to ${market_timezone}, and URI to ${scheduler_uri}."
              gcloud scheduler jobs update http "${job_name}" \
                --project="${GCP_PROJECT_ID}" \
                --location="${scheduler_location}" \
                --uri="${scheduler_uri}" \
                --schedule="${desired_schedule}" \
                --time-zone="${market_timezone}" \
                --quiet
            done
          done

      - name: Prune old Cloud Run revisions
        if: steps.config.outputs.enabled == 'true'
        env:
          SYNC_PLAN_JSON: ${{ steps.strategy_requirements.outputs.sync_plan_json }}
        run: |
          set -euo pipefail

          mapfile -t target_services < <(python - <<'PY'
          import json
          import os

          raw_plan = os.environ.get("SYNC_PLAN_JSON", "").strip()
          if raw_plan:
              plan = json.loads(raw_plan)
              for target in plan["targets"]:
                  print(target["service_name"])
              raise SystemExit(0)

          raw_targets = os.environ.get("CLOUD_RUN_SERVICE_TARGETS_JSON", "").strip()
          if raw_targets:
              payload = json.loads(raw_targets)
              entries = payload.get("targets") if isinstance(payload, dict) else payload
              for entry in entries:
                  service = (
                      entry.get("service")
                      or entry.get("service_name")
                      or entry.get("cloud_run_service")
                  )
                  runtime_target = entry.get("runtime_target") or entry.get("runtime_target_json")
                  if not service and isinstance(runtime_target, str):
                      runtime_target = json.loads(runtime_target)
                  if not service and isinstance(runtime_target, dict):
                      service = runtime_target.get("service_name")
                  service = str(service or "").strip()
                  if service:
                      print(service)
              raise SystemExit(0)

          raw_services = os.environ.get("CLOUD_RUN_SERVICES", "").strip() or os.environ.get("CLOUD_RUN_SERVICE", "").strip()
          for chunk in raw_services.replace(";", ",").replace("\n", ",").split(","):
              service = chunk.strip()
              if service:
                  print(service)
          PY
          )

          for cloud_run_service in "${target_services[@]}"; do
            keep_revisions="$(
              gcloud run services describe "${cloud_run_service}" \
                --region "${CLOUD_RUN_REGION}" \
                --format=json \
              | python -c '
          import json
          import sys
          service = json.load(sys.stdin)
          revisions = {
              item.get("revisionName")
              for item in service.get("status", {}).get("traffic", [])
              if item.get("revisionName") and int(item.get("percent") or 0) > 0
          }
          latest_ready = service.get("status", {}).get("latestReadyRevisionName")
          if latest_ready:
              revisions.add(latest_ready)
          for revision in sorted(revisions):
              print(revision)
          '
            )"

            if [ -z "${keep_revisions}" ]; then
              echo "No active Cloud Run revision found for ${cloud_run_service}; skipping revision prune." >&2
              continue
            fi

            mapfile -t revisions_to_delete < <(
              gcloud run revisions list \
                --service "${cloud_run_service}" \
                --region "${CLOUD_RUN_REGION}" \
                --format='value(metadata.name)' \
              | grep -Fvx -f <(printf '%s\n' "${keep_revisions}") || true
            )

            for revision in "${revisions_to_delete[@]}"; do
              echo "Deleting old Cloud Run revision ${revision} for ${cloud_run_service}."
              gcloud run revisions delete "${revision}" \
                --region "${CLOUD_RUN_REGION}" \
                --quiet
            done
          done

      - name: Clean up old Cloud Run images
        if: steps.config.outputs.deploy_enabled == 'true'
        run: |
          set -euo pipefail

          artifact_registry_hostname="${GCP_ARTIFACT_REGISTRY_HOSTNAME:-${CLOUD_RUN_REGION}-docker.pkg.dev}"
          image_repo="${artifact_registry_hostname}/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REGISTRY_REPOSITORY}/interactivebrokersplatform/cloud-run"
          old_digests="$(gcloud artifacts docker images list "${image_repo}" \
            --project="${GCP_PROJECT_ID}" \
            --include-tags \
            --format=json \
            | python -c 'import json,os,sys; keep=os.environ["GITHUB_SHA"]; rows=json.load(sys.stdin); print("\n".join(row["version"] for row in rows if keep not in set(row.get("tags") or [])))')"

          while IFS= read -r digest; do
            if [ -z "${digest}" ]; then
              continue
            fi
            gcloud artifacts docker images delete "${image_repo}@${digest}" \
              --project="${GCP_PROJECT_ID}" \
              --delete-tags \
              --async \
              --quiet
          done <<< "${old_digests}"
