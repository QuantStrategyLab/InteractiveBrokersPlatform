name: Sync Cloud Run Env

on:
  push:
    branches: [ main ]

env:
  GCP_PROJECT_ID: interactivebrokersquant
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/303168642265/locations/global/workloadIdentityPools/github-actions/providers/github-main
  GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ibkr-platform-deploy@interactivebrokersquant.iam.gserviceaccount.com

jobs:
  sync-cloud-run-env:
    name: Sync Cloud Run Env
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      ENABLE_GITHUB_ENV_SYNC: ${{ vars.ENABLE_GITHUB_ENV_SYNC }}
      CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      CLOUD_RUN_SERVICES: ${{ vars.CLOUD_RUN_SERVICES }}
      CLOUD_RUN_SERVICE_TARGETS_JSON: ${{ vars.CLOUD_RUN_SERVICE_TARGETS_JSON }}
      CLOUD_RUN_ENV_SYNC_WAIT_FOR_COMMIT: ${{ vars.CLOUD_RUN_ENV_SYNC_WAIT_FOR_COMMIT }}
      TELEGRAM_TOKEN_SECRET_NAME: ${{ vars.TELEGRAM_TOKEN_SECRET_NAME }}
      RUNTIME_TARGET_JSON: ${{ vars.RUNTIME_TARGET_JSON }}
      ACCOUNT_GROUP: ${{ vars.ACCOUNT_GROUP }}
      IB_ACCOUNT_GROUP_CONFIG_SECRET_NAME: ${{ vars.IB_ACCOUNT_GROUP_CONFIG_SECRET_NAME }}
      IBKR_FEATURE_SNAPSHOT_PATH: ${{ vars.IBKR_FEATURE_SNAPSHOT_PATH }}
      IBKR_FEATURE_SNAPSHOT_MANIFEST_PATH: ${{ vars.IBKR_FEATURE_SNAPSHOT_MANIFEST_PATH }}
      IBKR_STRATEGY_CONFIG_PATH: ${{ vars.IBKR_STRATEGY_CONFIG_PATH }}
      IBKR_STRATEGY_PLUGIN_MOUNTS_JSON: ${{ vars.IBKR_STRATEGY_PLUGIN_MOUNTS_JSON }}
      IBKR_RECONCILIATION_OUTPUT_PATH: ${{ vars.IBKR_RECONCILIATION_OUTPUT_PATH }}
      IBKR_DRY_RUN_ONLY: ${{ vars.IBKR_DRY_RUN_ONLY }}
      IBKR_PAPER_LIQUIDATE_ONLY: ${{ vars.IBKR_PAPER_LIQUIDATE_ONLY }}
      IBKR_MIN_RESERVED_CASH_USD: ${{ vars.IBKR_MIN_RESERVED_CASH_USD }}
      IBKR_RESERVED_CASH_RATIO: ${{ vars.IBKR_RESERVED_CASH_RATIO }}
      IBKR_SAFE_HAVEN_CASH_SUBSTITUTE_THRESHOLD_USD: ${{ vars.IBKR_SAFE_HAVEN_CASH_SUBSTITUTE_THRESHOLD_USD }}
      CRISIS_ALERT_CHANNELS: ${{ vars.CRISIS_ALERT_CHANNELS }}
      CRISIS_ALERT_EMAIL_RECIPIENTS: ${{ vars.CRISIS_ALERT_EMAIL_RECIPIENTS }}
      CRISIS_ALERT_EMAIL_SENDER_EMAIL: ${{ vars.CRISIS_ALERT_EMAIL_SENDER_EMAIL }}
      CRISIS_ALERT_EMAIL_SENDER_PASSWORD_SECRET_NAME: ${{ vars.CRISIS_ALERT_EMAIL_SENDER_PASSWORD_SECRET_NAME }}
      CRISIS_ALERT_EMAIL_SMTP_HOST: ${{ vars.CRISIS_ALERT_EMAIL_SMTP_HOST }}
      CRISIS_ALERT_EMAIL_SMTP_PORT: ${{ vars.CRISIS_ALERT_EMAIL_SMTP_PORT }}
      CRISIS_ALERT_EMAIL_SMTP_SECURITY: ${{ vars.CRISIS_ALERT_EMAIL_SMTP_SECURITY }}
      CRISIS_ALERT_SMS_RECIPIENTS: ${{ vars.CRISIS_ALERT_SMS_RECIPIENTS }}
      CRISIS_ALERT_SMS_PROVIDER: ${{ vars.CRISIS_ALERT_SMS_PROVIDER }}
      CRISIS_ALERT_SMS_ACCOUNT_ID: ${{ vars.CRISIS_ALERT_SMS_ACCOUNT_ID }}
      CRISIS_ALERT_SMS_AUTH_TOKEN_SECRET_NAME: ${{ vars.CRISIS_ALERT_SMS_AUTH_TOKEN_SECRET_NAME }}
      CRISIS_ALERT_SMS_SENDER: ${{ vars.CRISIS_ALERT_SMS_SENDER }}
      CRISIS_ALERT_SMS_MESSAGING_SERVICE_ID: ${{ vars.CRISIS_ALERT_SMS_MESSAGING_SERVICE_ID }}
      CRISIS_ALERT_SMS_API_BASE_URL: ${{ vars.CRISIS_ALERT_SMS_API_BASE_URL }}
      CRISIS_ALERT_SMS_BODY_MAX_CHARS: ${{ vars.CRISIS_ALERT_SMS_BODY_MAX_CHARS }}
      CRISIS_ALERT_PUSH_RECIPIENTS: ${{ vars.CRISIS_ALERT_PUSH_RECIPIENTS }}
      CRISIS_ALERT_PUSH_PROVIDER: ${{ vars.CRISIS_ALERT_PUSH_PROVIDER }}
      CRISIS_ALERT_PUSH_APP_TOKEN_SECRET_NAME: ${{ vars.CRISIS_ALERT_PUSH_APP_TOKEN_SECRET_NAME }}
      CRISIS_ALERT_PUSH_ACCESS_TOKEN_SECRET_NAME: ${{ vars.CRISIS_ALERT_PUSH_ACCESS_TOKEN_SECRET_NAME }}
      CRISIS_ALERT_PUSH_API_BASE_URL: ${{ vars.CRISIS_ALERT_PUSH_API_BASE_URL }}
      CRISIS_ALERT_PUSH_DEVICE: ${{ vars.CRISIS_ALERT_PUSH_DEVICE }}
      CRISIS_ALERT_PUSH_PRIORITY: ${{ vars.CRISIS_ALERT_PUSH_PRIORITY }}
      CRISIS_ALERT_PUSH_TAGS: ${{ vars.CRISIS_ALERT_PUSH_TAGS }}
      CRISIS_ALERT_PUSH_BODY_MAX_CHARS: ${{ vars.CRISIS_ALERT_PUSH_BODY_MAX_CHARS }}
      # Strategy-owned defaults continue to come from UsEquityStrategies; this workflow only syncs platform/runtime inputs.
      EXECUTION_REPORT_GCS_URI: ${{ vars.EXECUTION_REPORT_GCS_URI }}
      IB_GATEWAY_ZONE: ${{ vars.IB_GATEWAY_ZONE }}
      IB_GATEWAY_IP_MODE: ${{ vars.IB_GATEWAY_IP_MODE }}
      GLOBAL_TELEGRAM_CHAT_ID: ${{ vars.GLOBAL_TELEGRAM_CHAT_ID }}
      NOTIFY_LANG: ${{ vars.NOTIFY_LANG }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CRISIS_ALERT_EMAIL_SENDER_PASSWORD: ${{ secrets.CRISIS_ALERT_EMAIL_SENDER_PASSWORD }}
      CRISIS_ALERT_SMS_AUTH_TOKEN: ${{ secrets.CRISIS_ALERT_SMS_AUTH_TOKEN }}
      CRISIS_ALERT_PUSH_APP_TOKEN: ${{ secrets.CRISIS_ALERT_PUSH_APP_TOKEN }}
      CRISIS_ALERT_PUSH_ACCESS_TOKEN: ${{ secrets.CRISIS_ALERT_PUSH_ACCESS_TOKEN }}
    steps:
      - name: Check whether env sync is enabled
        id: config
        run: |
          set -euo pipefail

          if [ "${ENABLE_GITHUB_ENV_SYNC:-}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Cloud Run env sync because ENABLE_GITHUB_ENV_SYNC is not set to true." >&2
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Set up Python for strategy requirement resolution
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install strategy status dependencies
        if: steps.config.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Resolve Cloud Run sync targets
        id: strategy_requirements
        if: steps.config.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          sync_plan_json="$(python scripts/build_cloud_run_env_sync_plan.py --json)"
          {
            echo "sync_plan_json<<__SYNC_PLAN_JSON__"
            printf '%s\n' "${sync_plan_json}"
            echo "__SYNC_PLAN_JSON__"
          } >> "$GITHUB_OUTPUT"

      - name: Validate env sync inputs
        if: steps.config.outputs.enabled == 'true'
        env:
          SYNC_PLAN_JSON: ${{ steps.strategy_requirements.outputs.sync_plan_json }}
        run: |
          set -euo pipefail

          required_vars=(
            CLOUD_RUN_REGION
          )

          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              missing_vars+=("${var_name}")
            fi
          done

          if [ -z "${TELEGRAM_TOKEN_SECRET_NAME:-}" ] && [ -z "${TELEGRAM_TOKEN:-}" ]; then
            missing_vars+=("TELEGRAM_TOKEN_SECRET_NAME or TELEGRAM_TOKEN")
          fi

          python - <<'PY'
          import json
          import os
          plan = json.loads(os.environ["SYNC_PLAN_JSON"])
          targets = plan.get("targets") or []
          if not targets:
              raise SystemExit("Cloud Run env sync did not resolve any targets")
          for target in targets:
              service_name = str(target.get("service_name") or "").strip()
              if not service_name:
                  raise SystemExit("Cloud Run sync target is missing service_name")
              if not isinstance(target.get("env"), dict):
                  raise SystemExit(f"Cloud Run sync target {service_name} is missing env")
          PY

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Cloud Run env sync is enabled, but these values are missing:" >&2
            printf '  - %s\n' "${missing_vars[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: auth
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: ">= 416.0.0"

      - name: Wait for Cloud Run deployment of current commit
        if: steps.config.outputs.enabled == 'true'
        env:
          SYNC_PLAN_JSON: ${{ steps.strategy_requirements.outputs.sync_plan_json }}
        run: |
          set -euo pipefail

          mapfile -t target_services < <(python - <<'PY'
          import json
          import os
          plan = json.loads(os.environ["SYNC_PLAN_JSON"])
          for target in plan["targets"]:
              print(target["service_name"])
          PY
          )
          if [ "${#target_services[@]}" -eq 0 ]; then
            echo "Cloud Run env sync did not resolve any targets." >&2
            exit 1
          fi

          case "${CLOUD_RUN_ENV_SYNC_WAIT_FOR_COMMIT:-true}" in
            false|False|FALSE|0|no|No|NO|off|Off|OFF)
              echo "Skipping Cloud Run commit wait because CLOUD_RUN_ENV_SYNC_WAIT_FOR_COMMIT is disabled."
              exit 0
              ;;
          esac

          target_sha="${GITHUB_SHA}"

          for cloud_run_service in "${target_services[@]}"; do
            deadline=$((SECONDS + 1800))

            while true; do
              deployed_sha="$(gcloud run services describe "${cloud_run_service}" --region "${CLOUD_RUN_REGION}" --format='value(spec.template.metadata.labels.commit-sha)' 2>/dev/null || true)"
              if [ -n "${deployed_sha}" ] && [ "${deployed_sha}" = "${target_sha}" ]; then
                echo "Cloud Run service ${cloud_run_service} is on commit ${deployed_sha}."
                break
              fi

              if [ "${SECONDS}" -ge "${deadline}" ]; then
                echo "Timed out waiting for Cloud Run service ${cloud_run_service} to deploy commit ${target_sha}. Last seen commit: ${deployed_sha:-<none>}" >&2
                exit 1
              fi

              echo "Waiting for Cloud Run service ${cloud_run_service} to deploy commit ${target_sha}. Last seen commit: ${deployed_sha:-<none>}" >&2
              sleep 10
            done
          done

      - name: Sync Cloud Run environment
        if: steps.config.outputs.enabled == 'true'
        env:
          SYNC_PLAN_JSON: ${{ steps.strategy_requirements.outputs.sync_plan_json }}
        run: |
          set -euo pipefail

          mapfile -t target_services < <(python - <<'PY'
          import json
          import os
          plan = json.loads(os.environ["SYNC_PLAN_JSON"])
          for target in plan["targets"]:
              print(target["service_name"])
          PY
          )
          if [ "${#target_services[@]}" -eq 0 ]; then
            echo "Cloud Run env sync did not resolve any targets." >&2
            exit 1
          fi

          emit_target_env_pairs() {
            local target_index="$1"
            SYNC_TARGET_INDEX="${target_index}" python - <<'PY'
          import json
          import os
          plan = json.loads(os.environ["SYNC_PLAN_JSON"])
          target = plan["targets"][int(os.environ["SYNC_TARGET_INDEX"])]
          for key, value in sorted(target["env"].items()):
              print(f"{key}={value}")
          PY
          }

          emit_target_remove_env_vars() {
            local target_index="$1"
            SYNC_TARGET_INDEX="${target_index}" python - <<'PY'
          import json
          import os
          plan = json.loads(os.environ["SYNC_PLAN_JSON"])
          target = plan["targets"][int(os.environ["SYNC_TARGET_INDEX"])]
          for key in sorted(target.get("remove_env_vars") or []):
              print(key)
          PY
          }

          join_by_delimiter() {
            local delimiter="$1"
            shift
            local output=""
            local item
            for item in "$@"; do
              if [ -z "${output}" ]; then
                output="${item}"
              else
                output="${output}${delimiter}${item}"
              fi
            done
            printf '%s' "${output}"
          }

          shared_env_pairs=()
          shared_secret_pairs=()

          shared_remove_env_vars=(
            "IB_GATEWAY_HOST"
            "IB_GATEWAY_PORT"
            "TELEGRAM_CHAT_ID"
            "IB_CLIENT_ID"
            "IB_GATEWAY_INSTANCE_NAME"
            "IB_GATEWAY_MODE"
            "CRISIS_ALERT_GOOGLE_VOICE_TO"
            "CRISIS_ALERT_GOOGLE_VOICE_GATEWAY"
            "CRISIS_ALERT_GOOGLE_VOICE_GMAIL_USER"
            "CRISIS_ALERT_GOOGLE_VOICE_GMAIL_APP_PASSWORD"
            "CRISIS_ALERT_GOOGLE_VOICE_RECIPIENTS"
            "CRISIS_ALERT_GOOGLE_VOICE_SENDER_EMAIL"
            "CRISIS_ALERT_GOOGLE_VOICE_SENDER_PASSWORD"
            "CRISIS_ALERT_GOOGLE_VOICE_SMTP_HOST"
            "CRISIS_ALERT_GOOGLE_VOICE_SMTP_PORT"
            "CRISIS_ALERT_GOOGLE_VOICE_SMTP_SECURITY"
            "CRISIS_ALERT_SMTP_FROM"
            "CRISIS_ALERT_SMTP_HOST"
            "CRISIS_ALERT_SMTP_PORT"
            "CRISIS_ALERT_SMTP_USERNAME"
            "CRISIS_ALERT_SMTP_PASSWORD"
            "CRISIS_ALERT_SMTP_STARTTLS"
            "CRISIS_ALERT_SMTP_SSL"
          )
          shared_remove_secret_vars=(
            "CRISIS_ALERT_SMTP_PASSWORD"
            "CRISIS_ALERT_GOOGLE_VOICE_GMAIL_APP_PASSWORD"
            "CRISIS_ALERT_GOOGLE_VOICE_SENDER_PASSWORD"
          )

          if [ -n "${TELEGRAM_TOKEN_SECRET_NAME:-}" ]; then
            shared_secret_pairs+=("TELEGRAM_TOKEN=${TELEGRAM_TOKEN_SECRET_NAME}:latest")
          else
            shared_env_pairs+=("TELEGRAM_TOKEN=${TELEGRAM_TOKEN}")
            shared_remove_secret_vars+=("TELEGRAM_TOKEN")
          fi

          if [ -n "${CRISIS_ALERT_EMAIL_SENDER_PASSWORD_SECRET_NAME:-}" ]; then
            shared_secret_pairs+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD=${CRISIS_ALERT_EMAIL_SENDER_PASSWORD_SECRET_NAME}:latest")
            shared_remove_env_vars+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD")
          elif [ -n "${CRISIS_ALERT_EMAIL_SENDER_PASSWORD:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD=${CRISIS_ALERT_EMAIL_SENDER_PASSWORD}")
            shared_remove_secret_vars+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD")
            shared_remove_secret_vars+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD")
          fi

          if [ -n "${CRISIS_ALERT_SMS_AUTH_TOKEN_SECRET_NAME:-}" ]; then
            shared_secret_pairs+=("CRISIS_ALERT_SMS_AUTH_TOKEN=${CRISIS_ALERT_SMS_AUTH_TOKEN_SECRET_NAME}:latest")
            shared_remove_env_vars+=("CRISIS_ALERT_SMS_AUTH_TOKEN")
          elif [ -n "${CRISIS_ALERT_SMS_AUTH_TOKEN:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_SMS_AUTH_TOKEN=${CRISIS_ALERT_SMS_AUTH_TOKEN}")
            shared_remove_secret_vars+=("CRISIS_ALERT_SMS_AUTH_TOKEN")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_SMS_AUTH_TOKEN")
            shared_remove_secret_vars+=("CRISIS_ALERT_SMS_AUTH_TOKEN")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_APP_TOKEN_SECRET_NAME:-}" ]; then
            shared_secret_pairs+=("CRISIS_ALERT_PUSH_APP_TOKEN=${CRISIS_ALERT_PUSH_APP_TOKEN_SECRET_NAME}:latest")
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_APP_TOKEN")
          elif [ -n "${CRISIS_ALERT_PUSH_APP_TOKEN:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_PUSH_APP_TOKEN=${CRISIS_ALERT_PUSH_APP_TOKEN}")
            shared_remove_secret_vars+=("CRISIS_ALERT_PUSH_APP_TOKEN")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_APP_TOKEN")
            shared_remove_secret_vars+=("CRISIS_ALERT_PUSH_APP_TOKEN")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_ACCESS_TOKEN_SECRET_NAME:-}" ]; then
            shared_secret_pairs+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN=${CRISIS_ALERT_PUSH_ACCESS_TOKEN_SECRET_NAME}:latest")
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN")
          elif [ -n "${CRISIS_ALERT_PUSH_ACCESS_TOKEN:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN=${CRISIS_ALERT_PUSH_ACCESS_TOKEN}")
            shared_remove_secret_vars+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN")
            shared_remove_secret_vars+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN")
          fi

          if [ -n "${CRISIS_ALERT_CHANNELS:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_CHANNELS=${CRISIS_ALERT_CHANNELS}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_CHANNELS")
          fi

          if [ -n "${CRISIS_ALERT_EMAIL_RECIPIENTS:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_EMAIL_RECIPIENTS=${CRISIS_ALERT_EMAIL_RECIPIENTS}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_EMAIL_RECIPIENTS")
          fi

          if [ -n "${CRISIS_ALERT_EMAIL_SENDER_EMAIL:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_EMAIL_SENDER_EMAIL=${CRISIS_ALERT_EMAIL_SENDER_EMAIL}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_EMAIL_SENDER_EMAIL")
          fi

          if [ -n "${CRISIS_ALERT_EMAIL_SMTP_HOST:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_EMAIL_SMTP_HOST=${CRISIS_ALERT_EMAIL_SMTP_HOST}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_EMAIL_SMTP_HOST")
          fi

          if [ -n "${CRISIS_ALERT_EMAIL_SMTP_PORT:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_EMAIL_SMTP_PORT=${CRISIS_ALERT_EMAIL_SMTP_PORT}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_EMAIL_SMTP_PORT")
          fi

          if [ -n "${CRISIS_ALERT_EMAIL_SMTP_SECURITY:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_EMAIL_SMTP_SECURITY=${CRISIS_ALERT_EMAIL_SMTP_SECURITY}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_EMAIL_SMTP_SECURITY")
          fi

          if [ -n "${CRISIS_ALERT_SMS_RECIPIENTS:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_SMS_RECIPIENTS=${CRISIS_ALERT_SMS_RECIPIENTS}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_SMS_RECIPIENTS")
          fi

          if [ -n "${CRISIS_ALERT_SMS_PROVIDER:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_SMS_PROVIDER=${CRISIS_ALERT_SMS_PROVIDER}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_SMS_PROVIDER")
          fi

          if [ -n "${CRISIS_ALERT_SMS_ACCOUNT_ID:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_SMS_ACCOUNT_ID=${CRISIS_ALERT_SMS_ACCOUNT_ID}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_SMS_ACCOUNT_ID")
          fi

          if [ -n "${CRISIS_ALERT_SMS_SENDER:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_SMS_SENDER=${CRISIS_ALERT_SMS_SENDER}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_SMS_SENDER")
          fi

          if [ -n "${CRISIS_ALERT_SMS_MESSAGING_SERVICE_ID:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_SMS_MESSAGING_SERVICE_ID=${CRISIS_ALERT_SMS_MESSAGING_SERVICE_ID}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_SMS_MESSAGING_SERVICE_ID")
          fi

          if [ -n "${CRISIS_ALERT_SMS_API_BASE_URL:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_SMS_API_BASE_URL=${CRISIS_ALERT_SMS_API_BASE_URL}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_SMS_API_BASE_URL")
          fi

          if [ -n "${CRISIS_ALERT_SMS_BODY_MAX_CHARS:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_SMS_BODY_MAX_CHARS=${CRISIS_ALERT_SMS_BODY_MAX_CHARS}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_SMS_BODY_MAX_CHARS")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_RECIPIENTS:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_PUSH_RECIPIENTS=${CRISIS_ALERT_PUSH_RECIPIENTS}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_RECIPIENTS")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_PROVIDER:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_PUSH_PROVIDER=${CRISIS_ALERT_PUSH_PROVIDER}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_PROVIDER")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_API_BASE_URL:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_PUSH_API_BASE_URL=${CRISIS_ALERT_PUSH_API_BASE_URL}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_API_BASE_URL")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_DEVICE:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_PUSH_DEVICE=${CRISIS_ALERT_PUSH_DEVICE}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_DEVICE")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_PRIORITY:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_PUSH_PRIORITY=${CRISIS_ALERT_PUSH_PRIORITY}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_PRIORITY")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_TAGS:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_PUSH_TAGS=${CRISIS_ALERT_PUSH_TAGS}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_TAGS")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_BODY_MAX_CHARS:-}" ]; then
            shared_env_pairs+=("CRISIS_ALERT_PUSH_BODY_MAX_CHARS=${CRISIS_ALERT_PUSH_BODY_MAX_CHARS}")
          else
            shared_remove_env_vars+=("CRISIS_ALERT_PUSH_BODY_MAX_CHARS")
          fi

          for target_index in "${!target_services[@]}"; do
            cloud_run_service="${target_services[${target_index}]}"
            mapfile -t target_env_pairs < <(emit_target_env_pairs "${target_index}")
            mapfile -t target_remove_env_vars < <(emit_target_remove_env_vars "${target_index}")
            env_pairs=("${target_env_pairs[@]}" "${shared_env_pairs[@]}")
            remove_env_vars=("${target_remove_env_vars[@]}" "${shared_remove_env_vars[@]}")
            secret_pairs=("${shared_secret_pairs[@]}")
            remove_secret_vars=("${shared_remove_secret_vars[@]}")

            gcloud_args=(
              run services update "${cloud_run_service}"
              --region "${CLOUD_RUN_REGION}"
              --concurrency 1
              --max-instances 1
              --remove-env-vars "$(IFS=,; echo "${remove_env_vars[*]}")"
              --update-env-vars "^|^$(join_by_delimiter "|" "${env_pairs[@]}")"
            )

            if [ "${#remove_secret_vars[@]}" -gt 0 ]; then
              gcloud_args+=(--remove-secrets "$(IFS=,; echo "${remove_secret_vars[*]}")")
            fi

            if [ "${#secret_pairs[@]}" -gt 0 ]; then
              gcloud_args+=(--update-secrets "$(IFS=,; echo "${secret_pairs[*]}")")
            fi

            gcloud "${gcloud_args[@]}"
          done
