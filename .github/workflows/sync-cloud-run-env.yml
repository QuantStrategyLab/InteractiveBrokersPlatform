name: Sync Cloud Run Env

on:
  push:
    branches: [ main ]

env:
  GCP_PROJECT_ID: interactivebrokersquant
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/303168642265/locations/global/workloadIdentityPools/github-actions/providers/github-main
  GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: ibkr-platform-deploy@interactivebrokersquant.iam.gserviceaccount.com

jobs:
  sync-cloud-run-env:
    name: Sync Cloud Run Env
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      ENABLE_GITHUB_ENV_SYNC: ${{ vars.ENABLE_GITHUB_ENV_SYNC }}
      CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      CLOUD_RUN_SERVICES: ${{ vars.CLOUD_RUN_SERVICES }}
      CLOUD_RUN_ENV_SYNC_WAIT_FOR_COMMIT: ${{ vars.CLOUD_RUN_ENV_SYNC_WAIT_FOR_COMMIT }}
      TELEGRAM_TOKEN_SECRET_NAME: ${{ vars.TELEGRAM_TOKEN_SECRET_NAME }}
      RUNTIME_TARGET_JSON: ${{ vars.RUNTIME_TARGET_JSON }}
      ACCOUNT_GROUP: ${{ vars.ACCOUNT_GROUP }}
      IB_ACCOUNT_GROUP_CONFIG_SECRET_NAME: ${{ vars.IB_ACCOUNT_GROUP_CONFIG_SECRET_NAME }}
      IBKR_FEATURE_SNAPSHOT_PATH: ${{ vars.IBKR_FEATURE_SNAPSHOT_PATH }}
      IBKR_FEATURE_SNAPSHOT_MANIFEST_PATH: ${{ vars.IBKR_FEATURE_SNAPSHOT_MANIFEST_PATH }}
      IBKR_STRATEGY_CONFIG_PATH: ${{ vars.IBKR_STRATEGY_CONFIG_PATH }}
      IBKR_STRATEGY_PLUGIN_MOUNTS_JSON: ${{ vars.IBKR_STRATEGY_PLUGIN_MOUNTS_JSON }}
      IBKR_RECONCILIATION_OUTPUT_PATH: ${{ vars.IBKR_RECONCILIATION_OUTPUT_PATH }}
      IBKR_DRY_RUN_ONLY: ${{ vars.IBKR_DRY_RUN_ONLY }}
      IBKR_PAPER_LIQUIDATE_ONLY: ${{ vars.IBKR_PAPER_LIQUIDATE_ONLY }}
      IBKR_MIN_RESERVED_CASH_USD: ${{ vars.IBKR_MIN_RESERVED_CASH_USD }}
      IBKR_RESERVED_CASH_RATIO: ${{ vars.IBKR_RESERVED_CASH_RATIO }}
      IBKR_SAFE_HAVEN_CASH_SUBSTITUTE_THRESHOLD_USD: ${{ vars.IBKR_SAFE_HAVEN_CASH_SUBSTITUTE_THRESHOLD_USD }}
      CRISIS_ALERT_CHANNELS: ${{ vars.CRISIS_ALERT_CHANNELS }}
      CRISIS_ALERT_EMAIL_RECIPIENTS: ${{ vars.CRISIS_ALERT_EMAIL_RECIPIENTS }}
      CRISIS_ALERT_EMAIL_SENDER_EMAIL: ${{ vars.CRISIS_ALERT_EMAIL_SENDER_EMAIL }}
      CRISIS_ALERT_EMAIL_SENDER_PASSWORD_SECRET_NAME: ${{ vars.CRISIS_ALERT_EMAIL_SENDER_PASSWORD_SECRET_NAME }}
      CRISIS_ALERT_EMAIL_SMTP_HOST: ${{ vars.CRISIS_ALERT_EMAIL_SMTP_HOST }}
      CRISIS_ALERT_EMAIL_SMTP_PORT: ${{ vars.CRISIS_ALERT_EMAIL_SMTP_PORT }}
      CRISIS_ALERT_EMAIL_SMTP_SECURITY: ${{ vars.CRISIS_ALERT_EMAIL_SMTP_SECURITY }}
      CRISIS_ALERT_SMS_RECIPIENTS: ${{ vars.CRISIS_ALERT_SMS_RECIPIENTS }}
      CRISIS_ALERT_SMS_PROVIDER: ${{ vars.CRISIS_ALERT_SMS_PROVIDER }}
      CRISIS_ALERT_SMS_ACCOUNT_ID: ${{ vars.CRISIS_ALERT_SMS_ACCOUNT_ID }}
      CRISIS_ALERT_SMS_AUTH_TOKEN_SECRET_NAME: ${{ vars.CRISIS_ALERT_SMS_AUTH_TOKEN_SECRET_NAME }}
      CRISIS_ALERT_SMS_SENDER: ${{ vars.CRISIS_ALERT_SMS_SENDER }}
      CRISIS_ALERT_SMS_MESSAGING_SERVICE_ID: ${{ vars.CRISIS_ALERT_SMS_MESSAGING_SERVICE_ID }}
      CRISIS_ALERT_SMS_API_BASE_URL: ${{ vars.CRISIS_ALERT_SMS_API_BASE_URL }}
      CRISIS_ALERT_SMS_BODY_MAX_CHARS: ${{ vars.CRISIS_ALERT_SMS_BODY_MAX_CHARS }}
      CRISIS_ALERT_PUSH_RECIPIENTS: ${{ vars.CRISIS_ALERT_PUSH_RECIPIENTS }}
      CRISIS_ALERT_PUSH_PROVIDER: ${{ vars.CRISIS_ALERT_PUSH_PROVIDER }}
      CRISIS_ALERT_PUSH_APP_TOKEN_SECRET_NAME: ${{ vars.CRISIS_ALERT_PUSH_APP_TOKEN_SECRET_NAME }}
      CRISIS_ALERT_PUSH_ACCESS_TOKEN_SECRET_NAME: ${{ vars.CRISIS_ALERT_PUSH_ACCESS_TOKEN_SECRET_NAME }}
      CRISIS_ALERT_PUSH_API_BASE_URL: ${{ vars.CRISIS_ALERT_PUSH_API_BASE_URL }}
      CRISIS_ALERT_PUSH_DEVICE: ${{ vars.CRISIS_ALERT_PUSH_DEVICE }}
      CRISIS_ALERT_PUSH_PRIORITY: ${{ vars.CRISIS_ALERT_PUSH_PRIORITY }}
      CRISIS_ALERT_PUSH_TAGS: ${{ vars.CRISIS_ALERT_PUSH_TAGS }}
      CRISIS_ALERT_PUSH_BODY_MAX_CHARS: ${{ vars.CRISIS_ALERT_PUSH_BODY_MAX_CHARS }}
      # Strategy-owned defaults continue to come from UsEquityStrategies; this workflow only syncs platform/runtime inputs.
      EXECUTION_REPORT_GCS_URI: ${{ vars.EXECUTION_REPORT_GCS_URI }}
      IB_GATEWAY_ZONE: ${{ vars.IB_GATEWAY_ZONE }}
      IB_GATEWAY_IP_MODE: ${{ vars.IB_GATEWAY_IP_MODE }}
      GLOBAL_TELEGRAM_CHAT_ID: ${{ vars.GLOBAL_TELEGRAM_CHAT_ID }}
      NOTIFY_LANG: ${{ vars.NOTIFY_LANG }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CRISIS_ALERT_EMAIL_SENDER_PASSWORD: ${{ secrets.CRISIS_ALERT_EMAIL_SENDER_PASSWORD }}
      CRISIS_ALERT_SMS_AUTH_TOKEN: ${{ secrets.CRISIS_ALERT_SMS_AUTH_TOKEN }}
      CRISIS_ALERT_PUSH_APP_TOKEN: ${{ secrets.CRISIS_ALERT_PUSH_APP_TOKEN }}
      CRISIS_ALERT_PUSH_ACCESS_TOKEN: ${{ secrets.CRISIS_ALERT_PUSH_ACCESS_TOKEN }}
    steps:
      - name: Check whether env sync is enabled
        id: config
        run: |
          set -euo pipefail

          if [ "${ENABLE_GITHUB_ENV_SYNC:-}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Cloud Run env sync because ENABLE_GITHUB_ENV_SYNC is not set to true." >&2
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Set up Python for strategy requirement resolution
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install strategy status dependencies
        if: steps.config.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Resolve selected strategy runtime requirements
        id: strategy_requirements
        if: steps.config.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from us_equity_strategies import resolve_canonical_profile

          raw_runtime_target = os.environ.get("RUNTIME_TARGET_JSON", "").strip()
          if not raw_runtime_target:
              raise SystemExit("RUNTIME_TARGET_JSON is required")
          runtime_target = json.loads(raw_runtime_target)
          profile = str(runtime_target.get("strategy_profile") or "").strip().lower()
          if not profile:
              raise SystemExit("RUNTIME_TARGET_JSON.strategy_profile is required")
          canonical_profile = resolve_canonical_profile(profile)

          raw_status = subprocess.check_output(
              [sys.executable, "scripts/print_strategy_profile_status.py", "--json"],
              text=True,
          )
          rows = json.loads(raw_status)
          selected = next((row for row in rows if row["canonical_profile"] == canonical_profile), None)
          if selected is None:
              supported = ", ".join(sorted(row["canonical_profile"] for row in rows))
              raise SystemExit(f"Unsupported STRATEGY_PROFILE={profile!r}; supported: {supported}")
          if not selected.get("eligible") or not selected.get("enabled"):
              raise SystemExit(f"STRATEGY_PROFILE={profile!r} is not eligible/enabled: {selected}")

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(
                  f"requires_snapshot_artifacts={str(bool(selected.get('requires_snapshot_artifacts'))).lower()}\n"
              )
              output.write(
                  f"requires_snapshot_manifest_path={str(bool(selected.get('requires_snapshot_manifest_path'))).lower()}\n"
              )
              output.write(
                  f"requires_strategy_config_path={str(bool(selected.get('requires_strategy_config_path'))).lower()}\n"
              )
              output.write(
                  f"config_source_policy={str(selected.get('config_source_policy') or 'none')}\n"
              )
              output.write(
                  f"reconciliation_output_policy={str(selected.get('reconciliation_output_policy') or 'none')}\n"
              )
              output.write(f"strategy_profile={canonical_profile}\n")
              output.write(f"runtime_target_json={json.dumps(runtime_target, sort_keys=True)}\n")
          PY

      - name: Validate env sync inputs
        if: steps.config.outputs.enabled == 'true'
        env:
          REQUIRES_SNAPSHOT_ARTIFACTS: ${{ steps.strategy_requirements.outputs.requires_snapshot_artifacts }}
          REQUIRES_SNAPSHOT_MANIFEST_PATH: ${{ steps.strategy_requirements.outputs.requires_snapshot_manifest_path }}
          REQUIRES_STRATEGY_CONFIG_PATH: ${{ steps.strategy_requirements.outputs.requires_strategy_config_path }}
          CONFIG_SOURCE_POLICY: ${{ steps.strategy_requirements.outputs.config_source_policy }}
          RECONCILIATION_OUTPUT_POLICY: ${{ steps.strategy_requirements.outputs.reconciliation_output_policy }}
          RUNTIME_TARGET_JSON: ${{ steps.strategy_requirements.outputs.runtime_target_json }}
        run: |
          set -euo pipefail

          required_vars=(
            CLOUD_RUN_REGION
            ACCOUNT_GROUP
            IB_ACCOUNT_GROUP_CONFIG_SECRET_NAME
            GLOBAL_TELEGRAM_CHAT_ID
            NOTIFY_LANG
          )

          resolve_cloud_run_services() {
            local raw_services="${CLOUD_RUN_SERVICES:-}"
            if [ -z "$(printf '%s' "${raw_services}" | tr -d '[:space:],;')" ]; then
              raw_services="${CLOUD_RUN_SERVICE:-}"
            fi
            printf '%s\n' "${raw_services}" \
              | tr ',;' '\n' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
              | sed '/^$/d'
          }

          mapfile -t target_services < <(resolve_cloud_run_services)
          if [ "${#target_services[@]}" -eq 0 ]; then
            required_vars+=("CLOUD_RUN_SERVICES or CLOUD_RUN_SERVICE")
          fi

          if [ "${REQUIRES_SNAPSHOT_ARTIFACTS:-}" = "true" ]; then
            required_vars+=(IBKR_FEATURE_SNAPSHOT_PATH)
          fi

          if [ "${REQUIRES_SNAPSHOT_MANIFEST_PATH:-}" = "true" ]; then
            required_vars+=(IBKR_FEATURE_SNAPSHOT_MANIFEST_PATH)
          fi

          if [ "${REQUIRES_STRATEGY_CONFIG_PATH:-}" = "true" ] && [ "${CONFIG_SOURCE_POLICY:-}" = "env_only" ]; then
            required_vars+=(IBKR_STRATEGY_CONFIG_PATH)
          fi

          if [ "${RECONCILIATION_OUTPUT_POLICY:-}" = "required" ]; then
            required_vars+=(IBKR_RECONCILIATION_OUTPUT_PATH)
          fi

          if [ -z "${RUNTIME_TARGET_JSON:-}" ]; then
            required_vars+=(RUNTIME_TARGET_JSON)
          fi

          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              missing_vars+=("${var_name}")
            fi
          done

          if [ -z "${TELEGRAM_TOKEN_SECRET_NAME:-}" ] && [ -z "${TELEGRAM_TOKEN:-}" ]; then
            missing_vars+=("TELEGRAM_TOKEN_SECRET_NAME or TELEGRAM_TOKEN")
          fi

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Cloud Run env sync is enabled, but these values are missing:" >&2
            printf '  - %s\n' "${missing_vars[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: auth
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.config.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: ">= 416.0.0"

      - name: Wait for Cloud Run deployment of current commit
        if: steps.config.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          resolve_cloud_run_services() {
            local raw_services="${CLOUD_RUN_SERVICES:-}"
            if [ -z "$(printf '%s' "${raw_services}" | tr -d '[:space:],;')" ]; then
              raw_services="${CLOUD_RUN_SERVICE:-}"
            fi
            printf '%s\n' "${raw_services}" \
              | tr ',;' '\n' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
              | sed '/^$/d'
          }

          mapfile -t target_services < <(resolve_cloud_run_services)
          if [ "${#target_services[@]}" -eq 0 ]; then
            echo "CLOUD_RUN_SERVICES or CLOUD_RUN_SERVICE is required." >&2
            exit 1
          fi

          case "${CLOUD_RUN_ENV_SYNC_WAIT_FOR_COMMIT:-true}" in
            false|False|FALSE|0|no|No|NO|off|Off|OFF)
              echo "Skipping Cloud Run commit wait because CLOUD_RUN_ENV_SYNC_WAIT_FOR_COMMIT is disabled."
              exit 0
              ;;
          esac

          target_sha="${GITHUB_SHA}"

          for cloud_run_service in "${target_services[@]}"; do
            deadline=$((SECONDS + 1800))

            while true; do
              deployed_sha="$(gcloud run services describe "${cloud_run_service}" --region "${CLOUD_RUN_REGION}" --format='value(spec.template.metadata.labels.commit-sha)' 2>/dev/null || true)"
              if [ -n "${deployed_sha}" ] && [ "${deployed_sha}" = "${target_sha}" ]; then
                echo "Cloud Run service ${cloud_run_service} is on commit ${deployed_sha}."
                break
              fi

              if [ "${SECONDS}" -ge "${deadline}" ]; then
                echo "Timed out waiting for Cloud Run service ${cloud_run_service} to deploy commit ${target_sha}. Last seen commit: ${deployed_sha:-<none>}" >&2
                exit 1
              fi

              echo "Waiting for Cloud Run service ${cloud_run_service} to deploy commit ${target_sha}. Last seen commit: ${deployed_sha:-<none>}" >&2
              sleep 10
            done
          done

      - name: Sync Cloud Run environment
        if: steps.config.outputs.enabled == 'true'
        env:
          RUNTIME_TARGET_JSON: ${{ steps.strategy_requirements.outputs.runtime_target_json }}
          STRATEGY_PROFILE: ${{ steps.strategy_requirements.outputs.strategy_profile }}
        run: |
          set -euo pipefail

          resolve_cloud_run_services() {
            local raw_services="${CLOUD_RUN_SERVICES:-}"
            if [ -z "$(printf '%s' "${raw_services}" | tr -d '[:space:],;')" ]; then
              raw_services="${CLOUD_RUN_SERVICE:-}"
            fi
            printf '%s\n' "${raw_services}" \
              | tr ',;' '\n' \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
              | sed '/^$/d'
          }

          mapfile -t target_services < <(resolve_cloud_run_services)
          if [ "${#target_services[@]}" -eq 0 ]; then
            echo "CLOUD_RUN_SERVICES or CLOUD_RUN_SERVICE is required." >&2
            exit 1
          fi

          join_by_delimiter() {
            local delimiter="$1"
            shift
            local output=""
            local item
            for item in "$@"; do
              if [ -z "${output}" ]; then
                output="${item}"
              else
                output="${output}${delimiter}${item}"
              fi
            done
            printf '%s' "${output}"
          }

          env_pairs=(
            "GLOBAL_TELEGRAM_CHAT_ID=${GLOBAL_TELEGRAM_CHAT_ID}"
            "NOTIFY_LANG=${NOTIFY_LANG}"
            "ACCOUNT_GROUP=${ACCOUNT_GROUP}"
            "IB_ACCOUNT_GROUP_CONFIG_SECRET_NAME=${IB_ACCOUNT_GROUP_CONFIG_SECRET_NAME}"
            "STRATEGY_PROFILE=${STRATEGY_PROFILE}"
            "RUNTIME_TARGET_JSON=${RUNTIME_TARGET_JSON}"
          )
          secret_pairs=()

          remove_env_vars=(
            "IB_GATEWAY_HOST"
            "IB_GATEWAY_PORT"
            "TELEGRAM_CHAT_ID"
            "IB_CLIENT_ID"
            "IB_GATEWAY_INSTANCE_NAME"
            "IB_GATEWAY_MODE"
            "CRISIS_ALERT_GOOGLE_VOICE_TO"
            "CRISIS_ALERT_GOOGLE_VOICE_GATEWAY"
            "CRISIS_ALERT_GOOGLE_VOICE_GMAIL_USER"
            "CRISIS_ALERT_GOOGLE_VOICE_GMAIL_APP_PASSWORD"
            "CRISIS_ALERT_GOOGLE_VOICE_RECIPIENTS"
            "CRISIS_ALERT_GOOGLE_VOICE_SENDER_EMAIL"
            "CRISIS_ALERT_GOOGLE_VOICE_SENDER_PASSWORD"
            "CRISIS_ALERT_GOOGLE_VOICE_SMTP_HOST"
            "CRISIS_ALERT_GOOGLE_VOICE_SMTP_PORT"
            "CRISIS_ALERT_GOOGLE_VOICE_SMTP_SECURITY"
            "CRISIS_ALERT_SMTP_FROM"
            "CRISIS_ALERT_SMTP_HOST"
            "CRISIS_ALERT_SMTP_PORT"
            "CRISIS_ALERT_SMTP_USERNAME"
            "CRISIS_ALERT_SMTP_PASSWORD"
            "CRISIS_ALERT_SMTP_STARTTLS"
            "CRISIS_ALERT_SMTP_SSL"
          )
          remove_secret_vars=(
            "CRISIS_ALERT_SMTP_PASSWORD"
            "CRISIS_ALERT_GOOGLE_VOICE_GMAIL_APP_PASSWORD"
            "CRISIS_ALERT_GOOGLE_VOICE_SENDER_PASSWORD"
          )

          if [ -n "${TELEGRAM_TOKEN_SECRET_NAME:-}" ]; then
            secret_pairs+=("TELEGRAM_TOKEN=${TELEGRAM_TOKEN_SECRET_NAME}:latest")
          else
            env_pairs+=("TELEGRAM_TOKEN=${TELEGRAM_TOKEN}")
            remove_secret_vars+=("TELEGRAM_TOKEN")
          fi

          if [ -n "${CRISIS_ALERT_EMAIL_SENDER_PASSWORD_SECRET_NAME:-}" ]; then
            secret_pairs+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD=${CRISIS_ALERT_EMAIL_SENDER_PASSWORD_SECRET_NAME}:latest")
            remove_env_vars+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD")
          elif [ -n "${CRISIS_ALERT_EMAIL_SENDER_PASSWORD:-}" ]; then
            env_pairs+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD=${CRISIS_ALERT_EMAIL_SENDER_PASSWORD}")
            remove_secret_vars+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD")
          else
            remove_env_vars+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD")
            remove_secret_vars+=("CRISIS_ALERT_EMAIL_SENDER_PASSWORD")
          fi

          if [ -n "${CRISIS_ALERT_SMS_AUTH_TOKEN_SECRET_NAME:-}" ]; then
            secret_pairs+=("CRISIS_ALERT_SMS_AUTH_TOKEN=${CRISIS_ALERT_SMS_AUTH_TOKEN_SECRET_NAME}:latest")
            remove_env_vars+=("CRISIS_ALERT_SMS_AUTH_TOKEN")
          elif [ -n "${CRISIS_ALERT_SMS_AUTH_TOKEN:-}" ]; then
            env_pairs+=("CRISIS_ALERT_SMS_AUTH_TOKEN=${CRISIS_ALERT_SMS_AUTH_TOKEN}")
            remove_secret_vars+=("CRISIS_ALERT_SMS_AUTH_TOKEN")
          else
            remove_env_vars+=("CRISIS_ALERT_SMS_AUTH_TOKEN")
            remove_secret_vars+=("CRISIS_ALERT_SMS_AUTH_TOKEN")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_APP_TOKEN_SECRET_NAME:-}" ]; then
            secret_pairs+=("CRISIS_ALERT_PUSH_APP_TOKEN=${CRISIS_ALERT_PUSH_APP_TOKEN_SECRET_NAME}:latest")
            remove_env_vars+=("CRISIS_ALERT_PUSH_APP_TOKEN")
          elif [ -n "${CRISIS_ALERT_PUSH_APP_TOKEN:-}" ]; then
            env_pairs+=("CRISIS_ALERT_PUSH_APP_TOKEN=${CRISIS_ALERT_PUSH_APP_TOKEN}")
            remove_secret_vars+=("CRISIS_ALERT_PUSH_APP_TOKEN")
          else
            remove_env_vars+=("CRISIS_ALERT_PUSH_APP_TOKEN")
            remove_secret_vars+=("CRISIS_ALERT_PUSH_APP_TOKEN")
          fi

          if [ -n "${CRISIS_ALERT_PUSH_ACCESS_TOKEN_SECRET_NAME:-}" ]; then
            secret_pairs+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN=${CRISIS_ALERT_PUSH_ACCESS_TOKEN_SECRET_NAME}:latest")
            remove_env_vars+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN")
          elif [ -n "${CRISIS_ALERT_PUSH_ACCESS_TOKEN:-}" ]; then
            env_pairs+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN=${CRISIS_ALERT_PUSH_ACCESS_TOKEN}")
            remove_secret_vars+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN")
          else
            remove_env_vars+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN")
            remove_secret_vars+=("CRISIS_ALERT_PUSH_ACCESS_TOKEN")
          fi

          if [ -n "${IB_GATEWAY_ZONE:-}" ]; then
            env_pairs+=("IB_GATEWAY_ZONE=${IB_GATEWAY_ZONE}")
          else
            remove_env_vars+=("IB_GATEWAY_ZONE")
          fi

          if [ -n "${IB_GATEWAY_IP_MODE:-}" ]; then
            env_pairs+=("IB_GATEWAY_IP_MODE=${IB_GATEWAY_IP_MODE}")
          else
            remove_env_vars+=("IB_GATEWAY_IP_MODE")
          fi

          if [ -n "${IBKR_FEATURE_SNAPSHOT_PATH:-}" ]; then
            env_pairs+=("IBKR_FEATURE_SNAPSHOT_PATH=${IBKR_FEATURE_SNAPSHOT_PATH}")
          else
            remove_env_vars+=("IBKR_FEATURE_SNAPSHOT_PATH")
          fi

          if [ -n "${IBKR_FEATURE_SNAPSHOT_MANIFEST_PATH:-}" ]; then
            env_pairs+=("IBKR_FEATURE_SNAPSHOT_MANIFEST_PATH=${IBKR_FEATURE_SNAPSHOT_MANIFEST_PATH}")
          else
            remove_env_vars+=("IBKR_FEATURE_SNAPSHOT_MANIFEST_PATH")
          fi

          if [ -n "${IBKR_STRATEGY_CONFIG_PATH:-}" ]; then
            env_pairs+=("IBKR_STRATEGY_CONFIG_PATH=${IBKR_STRATEGY_CONFIG_PATH}")
          else
            remove_env_vars+=("IBKR_STRATEGY_CONFIG_PATH")
          fi

          if [ -n "${IBKR_STRATEGY_PLUGIN_MOUNTS_JSON:-}" ]; then
            env_pairs+=("IBKR_STRATEGY_PLUGIN_MOUNTS_JSON=${IBKR_STRATEGY_PLUGIN_MOUNTS_JSON}")
          else
            remove_env_vars+=("IBKR_STRATEGY_PLUGIN_MOUNTS_JSON")
          fi

          if [ -n "${IBKR_RECONCILIATION_OUTPUT_PATH:-}" ]; then
            env_pairs+=("IBKR_RECONCILIATION_OUTPUT_PATH=${IBKR_RECONCILIATION_OUTPUT_PATH}")
          else
            remove_env_vars+=("IBKR_RECONCILIATION_OUTPUT_PATH")
          fi

          if [ -n "${IBKR_DRY_RUN_ONLY:-}" ]; then
            env_pairs+=("IBKR_DRY_RUN_ONLY=${IBKR_DRY_RUN_ONLY}")
          else
            remove_env_vars+=("IBKR_DRY_RUN_ONLY")
          fi

          if [ -n "${IBKR_PAPER_LIQUIDATE_ONLY:-}" ]; then
            env_pairs+=("IBKR_PAPER_LIQUIDATE_ONLY=${IBKR_PAPER_LIQUIDATE_ONLY}")
          else
            remove_env_vars+=("IBKR_PAPER_LIQUIDATE_ONLY")
          fi

          if [ -n "${IBKR_SAFE_HAVEN_CASH_SUBSTITUTE_THRESHOLD_USD:-}" ]; then
            env_pairs+=("IBKR_SAFE_HAVEN_CASH_SUBSTITUTE_THRESHOLD_USD=${IBKR_SAFE_HAVEN_CASH_SUBSTITUTE_THRESHOLD_USD}")
          else
            remove_env_vars+=("IBKR_SAFE_HAVEN_CASH_SUBSTITUTE_THRESHOLD_USD")
          fi

          if [ -n "${IBKR_MIN_RESERVED_CASH_USD:-}" ]; then
